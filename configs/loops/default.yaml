training:
  epochs: 30
  max_grad_norm: 1.0

  dataloader:
    batch_size: 512
    num_workers: 8
    shuffle: true
    pin_memory: false

  early_stopping:
    patience: 5
    min_delta: 0.001

validation:
  dataloader:
    batch_size: 512
    num_workers: 8
    shuffle: false
    pin_memory: false

test:
  dataloader:
    batch_size: 2048
    num_workers: 8
    shuffle: false
    pin_memory: false
