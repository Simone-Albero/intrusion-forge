defaults:
  - data: cic_2018_v2
  - loops: default
  - model: tabular_classifier
  - loss: focal
  - optimizer: adamw
  - scheduler: one_cycle
  - _self_
  - experiment: supervised
  - path: default

seed: 42
name: exp
device: cpu
stage: all

# Alias so the per-classifier ${classifier.name} interpolation in path/default.yaml
# resolves consistently for both DL (model name) and ML (classifier config name).
classifier:
  name: ${model.name}

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: False
