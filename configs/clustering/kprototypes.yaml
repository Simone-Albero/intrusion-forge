distance: ${distance}              # inherited from the top-level key
max_fit_samples: 20000
min_cluster_floor: 5               # clusters smaller than this are absorbed into noise; also caps post-hoc splitting
target_cluster_size: 25000         # clusters above this size are split into sub-clusters (post-hoc, full-data MiniBatchKMeans)
algorithms:
  kprototypes:                       # mixed-type: k-means on numerics + matching dissimilarity on categoricals
    n_clusters: [4, 8, 16, 32, 64]
    gamma: [0.25, 0.5, 1.0, 2.0]     # weight of the categorical contribution (kmodes default ≈ 0.5 on scaled data)
