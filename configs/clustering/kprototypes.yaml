distance: ${distance}              # inherited from the top-level key
max_fit_samples: 20000
min_cluster_floor: 20              # CAP on min genuine cluster size (smaller → noise); the effective per-class floor scales down below this for small classes (see resolution_aware_floor). Keep ≥ complexity.min_subsample_per_cluster
min_clusters: 5                    # per-class floor on the SELECTED partition's cluster count (grid_search min_clusters) — guards against silhouette collapsing to a pathologically coarse k regardless of resolution_weight
grid_target_cluster_size: 50      # finest n_clusters candidate targets ~this avg cluster size (k≈n/this); band fans coarser ×2 per step. Count-based algos only. Total cluster count is also capped at max_complexity_samples//min_subsample_per_cluster (split per class) by the pipeline
resolution_weight: 0.5             # resolution tilt strength: prefer finer partitions unless a coarser one's silhouette is >this better. Higher → more clusters (more downstream regression support)
algorithms:
  kprototypes:                       # mixed-type: k-means on numerics + matching dissimilarity on categoricals. n_clusters derived per class
    gamma: [0.25, 0.5, 1.0, 2.0]     # weight of the categorical contribution (kmodes default ≈ 0.5 on scaled data)
