distance: ${distance}              # inherited from the top-level key
max_fit_samples: 20000
min_cluster_floor: 20              # min genuine cluster size (smaller → noise); also caps splitting. Keep ≥ complexity.min_subsample_per_cluster
target_cluster_size: 25000         # clusters above this size are split into sub-clusters (post-hoc, full-data MiniBatchKMeans)
grid_target_cluster_size: 200      # finest n_clusters candidate targets ~this avg cluster size (k≈n/this); band fans coarser ×2 per step. Count-based algos only. Distinct from the hard split cap above
resolution_weight: 0.5             # resolution tilt strength: prefer finer partitions unless a coarser one's silhouette is >this better. Higher → more clusters (more downstream regression support)
algorithms:
  spectral:                          # graph-based (k-NN), captures non-convex structure. n_clusters derived per class (eigsolve cost grows with K and fit size — keep max_fit_samples modest)
    affinity: nearest_neighbors
    n_neighbors: 10
