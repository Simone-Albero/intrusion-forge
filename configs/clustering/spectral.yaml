distance: ${distance}              # inherited from the top-level key
max_fit_samples: 20000
min_cluster_floor: 20              # min genuine cluster size (smaller → noise); also caps splitting. Keep ≥ complexity.min_subsample_per_cluster
target_cluster_size: 25000         # clusters above this size are split into sub-clusters (post-hoc, full-data MiniBatchKMeans)
algorithms:
  spectral:                          # graph-based (k-NN), captures non-convex structure
    n_clusters: [4, 8, 16, 32, 64]   # absolute grid (no 256: eigsolve cost grows with K and fit size)
    affinity: nearest_neighbors
    n_neighbors: 10
