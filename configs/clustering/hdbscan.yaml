distance: ${distance}              # inherited from the top-level key
max_fit_samples: 20000
min_cluster_floor: 5               # clusters smaller than this are absorbed into noise; also caps post-hoc splitting
target_cluster_size: 25000         # clusters above this size are split into sub-clusters (post-hoc, full-data MiniBatchKMeans)
algorithms:
  hdbscan:
    min_cluster_size: [5, 10, 25, 50, 100, 200]   # small floor so small classes can form genuine clusters instead of collapsing to all-noise
    min_samples: [1, 5, 15, 50, 100]              # capped low: high min_samples inflates core distances and manufactures noise
    cluster_selection_method: leaf
    # No acceptance gate: combos are ranked by the noise-penalised silhouette in
    # grid_search. Noise points → per-class pseudo-clusters, excluded from the
    # complexity graph and the failure meta-model downstream.
