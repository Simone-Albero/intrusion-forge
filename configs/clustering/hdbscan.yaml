distance: cosine
max_fit_samples: 10000
consensus_threshold: 0.5            # inert for a single algorithm
min_consensus_size: 1               # inert for a single algorithm
algorithms:
  hdbscan:
    min_cluster_size:
      rel_inv: [0.005, 0.01, 0.02, 0.05]
      min: 5
    min_samples:
      rel_inv: [0.0025, 0.005]
      min: 5
    cluster_selection_method: leaf
    max_cluster_size: null
    penalize: false
