distance: ${distance}              # inherited from the top-level key
max_fit_samples: 20000
consensus_threshold: 0.5
min_consensus_size: 1
min_cluster_floor: 5               # guard against degenerate K in grid search; post-hoc absorption is near-zero
target_cluster_size: 25000         # clusters above this size are split into sub-clusters (post-hoc, full-data MiniBatchKMeans)
target_size_frac: 0.05             # adaptive: effective target = clamp(2*floor, total_n * frac, target_cluster_size)
algorithms:
  hdbscan:
    min_cluster_size: [50, 100, 200]
    min_samples: [5, 15, 50, 100, 200]
    cluster_selection_method: leaf
    penalize: false                  # accept noisy clusterings (no abstained rounds);
                                     # noise points → per-class pseudo-clusters, excluded
                                     # from the meta-model downstream
    max_noise_ratio: 0.40            # only consulted when penalize=true
    min_clustered_ratio: 0.40        # only consulted when penalize=true
