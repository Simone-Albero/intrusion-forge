distance: cosine
max_fit_samples: 20000              # standalone: no s×s co-association, safe to raise the fit budget
consensus_threshold: 0.5            # inert for a single algorithm
min_consensus_size: 1               # inert for a single algorithm
algorithms:
  hdbscan:                           # density-based, handles noise natively
    min_cluster_size: [5, 10, 25, 50, 100, 200]   # absolute grid (size-independent; 5 = fine end)
    min_samples: [5, 15, 50]
    cluster_selection_method: leaf
    max_cluster_size: null
    penalize: false
