distance: ${distance}              # inherited from the top-level key
max_fit_samples: 20000
min_cluster_floor: 20              # CAP on min genuine cluster size (smaller → noise); the effective per-class floor scales down below this for small classes (see resolution_aware_floor). Keep ≥ complexity.min_subsample_per_cluster
min_clusters: 5                    # inert for hdbscan: count and size are decoupled here (min_cluster_size/min_samples), so a raw-count guard would admit many tiny clusters the absorption floor then wipes out. Kept for schema uniformity; see compose.py _N_CLUSTERS_ALGOS
grid_target_cluster_size: 50      # inert for hdbscan (no n_clusters knob; the per-class cluster-count cap is also unenforced here); kept for schema uniformity. Cluster count is driven by min_cluster_size + the resolution tilt in grid_search
resolution_weight: 0.5             # resolution tilt strength: favours the min_cluster_size giving more clusters unless a coarser one's silhouette is >this better
algorithms:
  hdbscan:
    min_cluster_size: [5, 10, 25, 50, 100, 200]   # small floor so small classes can form genuine clusters instead of collapsing to all-noise; the resolution tilt favours the smaller end (more clusters) where noise stays low
    min_samples: [1, 5, 15, 50, 100]              # capped low: high min_samples inflates core distances and manufactures noise
    cluster_selection_method: leaf                # leaf over eom: extracts finer, more numerous clusters
    # No acceptance gate: combos are ranked by silhouette − noise_penalty·noise_ratio
    # + resolution tilt in grid_search. Noise points → per-class pseudo-clusters,
    # excluded from the complexity graph and the failure meta-model downstream.
