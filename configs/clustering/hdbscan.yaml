distance: cosine
max_fit_samples: 10000
consensus_threshold: 0.5
min_consensus_size: 1              # only applies to the ensemble consensus; inert for a single algorithm
algorithms:
  hdbscan:
    min_cluster_size: [10, 30, 50]
    min_samples: [5, 10, 30]
    cluster_selection_method: leaf
    max_cluster_size: null
    penalize: false
