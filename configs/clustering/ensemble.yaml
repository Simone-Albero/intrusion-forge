distance: cosine
max_fit_samples: 10000
consensus_threshold: 0.5
min_consensus_size: 10              # consensus clusters smaller than this are pooled into per-class noise
algorithms:
  hdbscan:
    min_cluster_size: [10, 30, 50]
    min_samples: [5, 10, 30]
    cluster_selection_method: leaf
    max_cluster_size: null
    penalize: false
  kmeans:
    n_clusters: [2, 4, 8, 16, 32]   # aligned to standalone range to curb over-segmentation
  gmm:
    n_components: [2, 4, 8, 16]      # aligned to standalone range
    covariance_type: full
  birch:
    threshold: [0.2, 0.3, 0.5, 0.7, 1.0]
    branching_factor: 50
