distance: ${distance}              # inherited from the top-level key
max_fit_samples: 10000             # kept at 10k: co-association is a dense s×s matrix (O(s²) mem)
consensus_threshold: 0.5            # with M=3, threshold 0.5 = >= 2/3 votes (true majority)
weight_voters: true                # weight voters by reliability (coverage = 1 - noise_ratio)
refine_geometry: true              # post-consensus kNN-majority straggler reassignment
refine_margin: 0.8                 # reassign only if >=80% of kNN are in another single cluster
min_consensus_size: 25             # absolute min_cluster_size on the co-association matrix
min_cluster_floor: 50              # clusters below this size are absorbed into the class pseudo-cluster
target_cluster_size: 25000         # clusters above this size are split into sub-clusters (post-hoc, full-data MiniBatchKMeans)
target_size_frac: 0.05             # adaptive: effective target = clamp(2*floor, total_n * frac, target_cluster_size)

algorithms:
  kmeans:
    n_clusters: [4, 8, 16, 32, 64, 128]
  hdbscan:
    min_cluster_size: [5, 10, 25, 50, 100, 200]
    min_samples: [5, 15, 50, 100, 200]
    cluster_selection_method: leaf
    max_cluster_size: null
    penalize: false
  spectral:
    n_clusters: [4, 8, 16, 32, 64]
    affinity: nearest_neighbors
    n_neighbors: 10
