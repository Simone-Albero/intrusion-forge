distance: cosine
max_fit_samples: 10000
consensus_threshold: 0.5            # HDBSCAN(precomputed) cluster_selection_epsilon = 1 - threshold
min_consensus_size:                  # min_cluster_size on the co-association matrix
  rel: 0.005
  min: 5
algorithms:
  kmeans:
    n_clusters:
      rel: [0.005, 0.01, 0.02, 0.05]
      min: 4
      max: 64
  gmm:
    n_components:
      rel: [0.005, 0.01, 0.02, 0.05]
      min: 4
      max: 64
    covariance_type: full
  hdbscan:
    min_cluster_size:
      rel_inv: [0.005, 0.01, 0.02, 0.05]
      min: 5
    min_samples:
      rel_inv: [0.0025, 0.005]
      min: 5
    cluster_selection_method: leaf
    max_cluster_size: null
    penalize: false
  birch:
    n_clusters:
      rel: [0.005, 0.01, 0.02, 0.05]
      min: 4
      max: 64
    branching_factor: 50
  spectral:
    n_clusters:
      rel: [0.005, 0.01, 0.02, 0.05]
      min: 4
      max: 64
    affinity: rbf
