# @package _global_
defaults:
  - override /model: tabular_classifier
  - override /loss: focal
  - override /loops: default
  - override /optimizer: adamw
  - override /scheduler: one_cycle

k: 5                                      # k for complexity k-NN graph (build_knn_graph)
min_cluster_sizes: [30, 50, 100, 150]
min_samples_list: [10, 30, 50]
max_fit_samples: 10000

n_samples: null
run_id: 0
failure_threshold: 0.0
max_complexity_samples: 200000
stage: all
